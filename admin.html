<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickQuiz — Admin</title>
<style>
  :root{
    --ink:#12101c; --ink-2:#1c1930; --buzzer:#ff3b3b; --gold:#ffc93c;
    --cream:#f4f1ff; --ok:#3ade7a; --muted:#a49bc7;
    --font-display:'Unbounded', system-ui, sans-serif;
    --font-body:'Inter', system-ui, sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Inter:wght@400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink);color:var(--cream);font-family:var(--font-body);min-height:100vh;}
  .wrap{max-width:640px;margin:0 auto;padding:60px 20px;}
  h1{font-family:var(--font-display);font-weight:900;font-size:1.6rem;margin-bottom:6px;}
  h1 span{color:var(--buzzer);}
  .sub{color:var(--muted);margin-bottom:34px;font-size:0.9rem;}

  #loginBox{
    background:var(--ink-2);border:1px solid rgba(244,241,255,0.1);
    border-radius:18px;padding:30px;
  }
  input, select, textarea{
    width:100%;background:rgba(244,241,255,0.06);
    border:1px solid rgba(244,241,255,0.15);color:var(--cream);
    padding:12px 14px;border-radius:10px;font-size:0.95rem;margin-bottom:14px;font-family:inherit;
  }
  textarea{min-height:100px;resize:vertical;}
  label{font-size:0.8rem;color:var(--muted);font-weight:600;display:block;margin-bottom:6px;}
  button{
    background:var(--buzzer);color:white;border:none;font-weight:700;
    padding:13px 22px;border-radius:100px;cursor:pointer;font-size:0.95rem;
  }
  button.secondary{background:transparent;border:1px solid rgba(244,241,255,0.25);color:var(--cream);}
  button.small{padding:6px 14px;font-size:0.8rem;}
  .error{color:var(--buzzer);font-size:0.85rem;margin-top:8px;}
  .ok-msg{color:var(--ok);font-size:0.85rem;margin-top:8px;}

  #adminPanel{display:none;}
  .tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
  .tab-btn{
    background:var(--ink-2);border:1px solid rgba(244,241,255,0.1);
    color:var(--muted);padding:10px 18px;border-radius:100px;cursor:pointer;font-weight:600;font-size:0.85rem;
  }
  .tab-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}
  .panel{display:none;background:var(--ink-2);border:1px solid rgba(244,241,255,0.1);border-radius:18px;padding:26px;margin-bottom:20px;}
  .panel.active{display:block;}
  .panel h2{font-family:var(--font-display);font-size:1.05rem;margin-bottom:16px;}
  .options-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .radio-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .radio-row input[type=radio]{width:auto;margin:0;}
  .list-item{
    display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px;border-radius:10px;background:rgba(244,241,255,0.04);margin-bottom:8px;font-size:0.85rem;
  }
  .list-item .meta{color:var(--muted);font-size:0.75rem;}
  #topBar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  #userEmail{font-size:0.8rem;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <h1>Quick<span>Quiz</span> — Admin</h1>
  <p class="sub">Interface privée réservée aux administrateurs.</p>

  <div id="loginBox">
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="toi@exemple.com">
    <label>Mot de passe</label>
    <input type="password" id="loginPass" placeholder="••••••••">
    <button onclick="doLogin()">Se connecter</button>
    <div id="loginError" class="error"></div>
  </div>

  <div id="adminPanel">
    <div id="topBar">
      <span id="userEmail"></span>
      <button class="secondary small" onclick="doLogout()">Déconnexion</button>
    </div>

    <div class="tabs">
      <div class="tab-btn active" data-tab="content">📰 Articles / Actus</div>
      <div class="tab-btn" data-tab="quiz">🧠 Questions de quiz</div>
      <div class="tab-btn" data-tab="manage">🗂 Contenu existant</div>
    </div>

    <!-- ARTICLES / ACTUS / MEDIA -->
    <div class="panel active" id="panel-content">
      <h2>Nouveau post (article, actu, photo ou vidéo)</h2>
      <label>Type de post</label>
      <select id="postType">
        <option value="blog">Article de blog</option>
        <option value="actu">Actualité courte</option>
        <option value="media">Photo / Vidéo seule</option>
      </select>
      <label>Titre</label>
      <input type="text" id="postTitle" placeholder="Titre du post">
      <label>Contenu / texte</label>
      <textarea id="postContent" placeholder="Texte de l'article ou de l'actu..."></textarea>
      <label>Photo ou vidéo (optionnel)</label>
      <input type="file" id="postFile" accept="image/*,video/*">
      <button onclick="submitPost()">Publier</button>
      <div id="postMsg"></div>
    </div>

    <!-- QUIZ -->
    <div class="panel" id="panel-quiz">
      <h2>Nouvelle question de quiz</h2>
      <label>Catégorie</label>
      <input type="text" id="quizCat" placeholder="ex: culture, cine, musique, sport, sciences, geo, ou nouvelle catégorie">
      <label>Question</label>
      <input type="text" id="quizQ" placeholder="Quelle est la capitale de...">
      <label>4 réponses (coche la bonne)</label>
      <div class="options-row">
        <div><div class="radio-row"><input type="radio" name="correct" value="0" checked><input type="text" id="opt0" placeholder="Réponse A"></div></div>
        <div><div class="radio-row"><input type="radio" name="correct" value="1"><input type="text" id="opt1" placeholder="Réponse B"></div></div>
        <div><div class="radio-row"><input type="radio" name="correct" value="2"><input type="text" id="opt2" placeholder="Réponse C"></div></div>
        <div><div class="radio-row"><input type="radio" name="correct" value="3"><input type="text" id="opt3" placeholder="Réponse D"></div></div>
      </div>
      <button onclick="submitQuestion()">Ajouter la question</button>
      <div id="quizMsg"></div>
    </div>

    <!-- MANAGE -->
    <div class="panel" id="panel-manage">
      <h2>Posts publiés</h2>
      <div id="postsList"></div>
      <h2 style="margin-top:24px;">Questions de quiz</h2>
      <div id="quizList"></div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  // ---------- AUTH ----------
  function doLogin(){
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    document.getElementById('loginError').textContent = '';
    auth.signInWithEmailAndPassword(email, pass)
      .catch(err => { document.getElementById('loginError').textContent = "Connexion refusée : " + err.message; });
  }
  function doLogout(){ auth.signOut(); }

  auth.onAuthStateChanged(user => {
    if(user && ADMIN_EMAILS.includes(user.email)){
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      document.getElementById('userEmail').textContent = user.email;
      loadPosts();
      loadQuestions();
    } else if(user) {
      document.getElementById('loginError').textContent = "Ce compte n'est pas autorisé (email non admin).";
      auth.signOut();
    } else {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('adminPanel').style.display = 'none';
    }
  });

  // ---------- TABS ----------
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    });
  });

  // ---------- POSTS (blog / actu / media) ----------
  async function submitPost(){
    const type = document.getElementById('postType').value;
    const title = document.getElementById('postTitle').value.trim();
    const content = document.getElementById('postContent').value.trim();
    const fileInput = document.getElementById('postFile');
    const msg = document.getElementById('postMsg');
    if(!title){ msg.textContent = "Ajoute au moins un titre."; msg.className='error'; return; }
    msg.textContent = "Publication en cours..."; msg.className='';

    let mediaUrl = null, mediaType = null;
    try{
      if(fileInput.files.length > 0){
        const file = fileInput.files[0];
        mediaType = file.type.startsWith('video') ? 'video' : 'image';
        const formData = new FormData();
        formData.append('file', file);
        formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
        const cloudRes = await fetch(
          `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${mediaType === 'video' ? 'video' : 'image'}/upload`,
          { method: 'POST', body: formData }
        );
        const cloudData = await cloudRes.json();
        if(!cloudData.secure_url) throw new Error(cloudData.error?.message || "Échec de l'upload Cloudinary");
        mediaUrl = cloudData.secure_url;
      }
      await db.collection('posts').add({
        type, title, content, mediaUrl, mediaType,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      msg.textContent = "Publié !"; msg.className='ok-msg';
      document.getElementById('postTitle').value='';
      document.getElementById('postContent').value='';
      fileInput.value='';
      loadPosts();
    } catch(err){
      msg.textContent = "Erreur : " + err.message; msg.className='error';
    }
  }

  function loadPosts(){
    db.collection('posts').orderBy('createdAt','desc').get().then(snap=>{
      const list = document.getElementById('postsList');
      list.innerHTML = '';
      snap.forEach(doc=>{
        const p = doc.data();
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<div><strong>${p.title}</strong><div class="meta">${p.type}</div></div>
          <button class="secondary small" onclick="deletePost('${doc.id}')">Supprimer</button>`;
        list.appendChild(div);
      });
    });
  }
  function deletePost(id){
    if(confirm('Supprimer ce post ?')) db.collection('posts').doc(id).delete().then(loadPosts);
  }

  // ---------- QUIZ QUESTIONS ----------
  async function submitQuestion(){
    const category = document.getElementById('quizCat').value.trim().toLowerCase();
    const question = document.getElementById('quizQ').value.trim();
    const options = [0,1,2,3].map(i => document.getElementById('opt'+i).value.trim());
    const answer = parseInt(document.querySelector('input[name=correct]:checked').value);
    const msg = document.getElementById('quizMsg');
    if(!category || !question || options.some(o=>!o)){
      msg.textContent = "Remplis la catégorie, la question et les 4 réponses."; msg.className='error'; return;
    }
    try{
      await db.collection('quizQuestions').add({
        category, question, options, answer,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      msg.textContent = "Question ajoutée !"; msg.className='ok-msg';
      document.getElementById('quizQ').value='';
      [0,1,2,3].forEach(i=>document.getElementById('opt'+i).value='');
      loadQuestions();
    } catch(err){
      msg.textContent = "Erreur : " + err.message; msg.className='error';
    }
  }

  function loadQuestions(){
    db.collection('quizQuestions').orderBy('createdAt','desc').get().then(snap=>{
      const list = document.getElementById('quizList');
      list.innerHTML = '';
      snap.forEach(doc=>{
        const q = doc.data();
        const div = document.createElement('div');
        div.className = 'list-item';
        div.innerHTML = `<div><strong>${q.question}</strong><div class="meta">${q.category}</div></div>
          <button class="secondary small" onclick="deleteQuestion('${doc.id}')">Supprimer</button>`;
        list.appendChild(div);
      });
    });
  }
  function deleteQuestion(id){
    if(confirm('Supprimer cette question ?')) db.collection('quizQuestions').doc(id).delete().then(loadQuestions);
  }
</script>
</body>
</html>
